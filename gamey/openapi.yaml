openapi: 3.0.0
info:
  title: Gamey API
  description: API del motor de juego Y (Gamey). Gestiona partidas y proporciona movimientos de bots.
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Development server

paths:

  /status:
    get:
      summary: Health check del servicio
      description: Devuelve "OK" para indicar que el servidor está en marcha.
      responses:
        '200':
          description: El servicio está activo
          content:
            text/plain:
              schema:
                type: string
                example: "OK"

  /play:
    post:
      summary: Solicita un movimiento al bot
      description: >
        Dado el estado actual de la partida en formato YEN y un tipo de bot opcional,
        devuelve las coordenadas del movimiento elegido por el bot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - position
              properties:
                position:
                  $ref: '#/components/schemas/YEN'
                bot_type:
                  type: string
                  description: >
                    Identificador del bot a usar. Por defecto "montecarlo_endurecido_bot".
                  enum:
                    - random_bot
                    - defensive_bot
                    - offensive_bot
                    - montecarlo_bot
                    - montecarlo_mejorado_bot
                    - montecarlo_endurecido_bot
                  example: "montecarlo_endurecido_bot"
      responses:
        '200':
          description: Movimiento elegido por el bot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoveResponse'
        '400':
          description: Error en la petición (YEN inválido, bot no encontrado, sin movimientos válidos)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotErrorResponse'

  /v1/games:
    post:
      summary: Crea una nueva partida
      description: Crea una nueva partida con el tamaño de tablero indicado y devuelve su ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - board_size
              properties:
                board_size:
                  type: integer
                  format: int32
                  minimum: 1
                  description: Tamaño del tablero (longitud de un lado del triángulo)
                  example: 5
      responses:
        '201':
          description: Partida creada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGameResponse'

    get:
      summary: Lista todas las partidas activas
      description: Devuelve un array con los IDs de todas las partidas activas en memoria.
      responses:
        '200':
          description: Lista de IDs de partidas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["game-1", "game-2"]

  /v1/games/{game_id}:
    get:
      summary: Obtiene el estado completo de una partida
      description: Devuelve el estado actual del tablero y el estado de la partida (en curso o finalizada).
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Estado de la partida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStateResponse'
        '404':
          description: Partida no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'

    delete:
      summary: Elimina una partida
      description: Borra la partida con el ID indicado de la memoria del servidor.
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '204':
          description: Partida eliminada correctamente
        '404':
          description: Partida no encontrada

  /v1/games/{game_id}/status:
    get:
      summary: Obtiene el estado de victoria de una partida
      description: Devuelve únicamente si la partida está en curso o ha finalizado, y quién juega o ha ganado.
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Estado de la partida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStatusDto'
        '404':
          description: Partida no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'

  /v1/games/{game_id}/move:
    post:
      summary: Realiza un movimiento de colocación de pieza
      description: Coloca la pieza del jugador indicado en las coordenadas especificadas.
      parameters:
        - $ref: '#/components/parameters/GameId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - player
                - x
                - y
                - z
              properties:
                player:
                  type: integer
                  format: int32
                  minimum: 0
                  description: ID del jugador (0 o 1)
                  example: 0
                x:
                  type: integer
                  format: int32
                  minimum: 0
                  description: Coordenada x de la celda
                  example: 2
                y:
                  type: integer
                  format: int32
                  minimum: 0
                  description: Coordenada y de la celda
                  example: 0
                z:
                  type: integer
                  format: int32
                  minimum: 0
                  description: Coordenada z de la celda
                  example: 0
      responses:
        '200':
          description: Movimiento aplicado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStateResponse'
        '400':
          description: Movimiento inválido (turno incorrecto, celda ocupada, partida terminada, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        '404':
          description: Partida no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'

  /v1/games/{game_id}/action:
    post:
      summary: Realiza una acción especial
      description: >
        Aplica una acción especial al juego. Las acciones disponibles son:
        - **resign**: el jugador se rinde (la partida termina con el otro como ganador).
        - **swap**: el jugador intercambia colores con el rival (solo válido en el primer turno del jugador 1).
      parameters:
        - $ref: '#/components/parameters/GameId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - player
                - action
              properties:
                player:
                  type: integer
                  format: int32
                  minimum: 0
                  description: ID del jugador (0 o 1)
                  example: 0
                action:
                  type: string
                  enum:
                    - resign
                    - swap
                  description: Acción a realizar
                  example: "resign"
      responses:
        '200':
          description: Acción aplicada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStateResponse'
        '400':
          description: Acción inválida o no permitida en el estado actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        '404':
          description: Partida no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'

  /v1/games/{game_id}/undo:
    post:
      summary: Deshace el último movimiento
      description: Revierte el último movimiento aplicado en la partida y devuelve el estado anterior.
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Movimiento deshecho correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStateResponse'
        '400':
          description: No hay movimientos que deshacer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'
        '404':
          description: Partida no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceErrorResponse'

components:

  parameters:
    GameId:
      name: game_id
      in: path
      required: true
      description: Identificador único de la partida
      schema:
        type: string
        example: "game-1"

  schemas:

    YEN:
      type: object
      description: >
        Y Exchange Notation (YEN) — formato compacto para representar el estado de una partida Y.
        Inspirado en la notación FEN del ajedrez.
      required:
        - size
        - turn
        - players
        - layout
      properties:
        size:
          type: integer
          format: int32
          minimum: 1
          description: Tamaño del tablero (longitud de un lado del triángulo)
          example: 3
        turn:
          type: integer
          format: int32
          minimum: 0
          description: Índice del jugador al que le toca mover (0 o 1)
          example: 0
        players:
          type: array
          items:
            type: string
            maxLength: 1
          description: Símbolos de cada jugador (p.ej. ["B", "R"])
          example: ["B", "R"]
        layout:
          type: string
          description: >
            Representación compacta del tablero. Las filas se separan con '/',
            las celdas se representan con el símbolo del jugador o '.' para vacías.
          example: "B/BR/.R."

    Coordinates:
      type: object
      required:
        - x
        - y
        - z
      properties:
        x:
          type: integer
          format: int32
          minimum: 0
          description: Coordenada x
          example: 2
        y:
          type: integer
          format: int32
          minimum: 0
          description: Coordenada y
          example: 0
        z:
          type: integer
          format: int32
          minimum: 0
          description: Coordenada z
          example: 0

    MoveResponse:
      type: object
      description: Respuesta del endpoint /play con el movimiento elegido por el bot
      required:
        - bot_id
        - coords
      properties:
        bot_id:
          type: string
          description: Identificador del bot que seleccionó el movimiento
          example: "montecarlo_endurecido_bot"
        coords:
          $ref: '#/components/schemas/Coordinates'

    BotErrorResponse:
      type: object
      description: Error devuelto por el endpoint /play
      required:
        - message
      properties:
        api_version:
          type: string
          nullable: true
          description: Versión de la API solicitada, si estaba disponible
          example: null
        bot_id:
          type: string
          nullable: true
          description: ID del bot solicitado, si estaba disponible
          example: "random_bot"
        message:
          type: string
          description: Descripción del error
          example: "Bot not found: unknown_bot, available bots: [random_bot, defensive_bot, ...]"

    CreateGameResponse:
      type: object
      description: Respuesta al crear una nueva partida
      required:
        - game_id
        - board_size
      properties:
        game_id:
          type: string
          description: Identificador único asignado a la partida
          example: "game-1"
        board_size:
          type: integer
          format: int32
          minimum: 1
          description: Tamaño del tablero de la partida creada
          example: 5

    GameStatusDto:
      type: object
      description: >
        Estado de la partida. El campo "kind" indica si está en curso (Ongoing) o terminada (Finished).
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - Ongoing
            - Finished
          description: Tipo de estado de la partida
          example: "Ongoing"
        next_player:
          type: integer
          format: int32
          description: ID del jugador que debe mover (solo cuando kind = "Ongoing")
          example: 1
        winner:
          type: integer
          format: int32
          description: ID del jugador ganador (solo cuando kind = "Finished")
          example: 0

    GameStateResponse:
      type: object
      description: Estado completo de una partida
      required:
        - game_id
        - state
        - status
      properties:
        game_id:
          type: string
          description: Identificador de la partida
          example: "game-1"
        state:
          $ref: '#/components/schemas/YEN'
        status:
          $ref: '#/components/schemas/GameStatusDto'

    ServiceErrorResponse:
      type: object
      description: Error devuelto por los endpoints de gestión de partidas
      required:
        - error
      properties:
        error:
          type: string
          description: Descripción del error
          example: "Juego no encontrado con ID: game-99"
