openapi: 3.0.0
info:
  title: User Service API
  description: API para la gestión de usuarios, sesiones y estadísticas de partidas.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Development server

paths:

  /loginuser:
    post:
      summary: Inicia sesión de un usuario
      description: Verifica las credenciales del usuario y devuelve un mensaje de confirmación.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "testuser"
                password:
                  type: string
                  example: "Password1"
      responses:
        '200':
          description: Sesión iniciada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Sesión iniciada con testuser."
        '400':
          description: Campos obligatorios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Usuario o contraseña incorrectos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /createuser:
    post:
      summary: Crea un nuevo usuario
      description: >
        Registra un nuevo usuario en el sistema. La contraseña debe tener al menos
        5 caracteres, una mayúscula, una minúscula y un número.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "nuevoUsuario"
                password:
                  type: string
                  description: >
                    Mínimo 5 caracteres, debe contener al menos una mayúscula,
                    una minúscula y un número.
                  example: "Password1"
      responses:
        '201':
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Se creó el usuario nuevoUsuario"
        '400':
          description: Campos obligatorios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Contraseña débil (no cumple los requisitos)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: El usuario ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /deleteuser:
    post:
      summary: Elimina un usuario (solo para tests)
      description: Borra el usuario con el nombre indicado. Endpoint destinado exclusivamente a entornos de pruebas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  example: "testuser"
      responses:
        '201':
          description: Usuario eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Se eliminó el usuario testuser"
        '400':
          description: Username ausente o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      summary: Obtiene los datos de un usuario
      description: Devuelve la información de un usuario por su nombre. La contraseña nunca se incluye en la respuesta.
      parameters:
        - name: id
          in: path
          required: true
          description: Nombre de usuario (username)
          schema:
            type: string
            example: "testuser"
      responses:
        '200':
          description: Datos del usuario (sin contraseña)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /initmatch:
    post:
      summary: Inicia una nueva partida
      description: Registra el comienzo de una partida para el usuario indicado con la estrategia y dificultad especificadas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchRequest'
      responses:
        '202':
          description: Partida iniciada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Campos obligatorios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Dificultad no válida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '406':
          description: Estrategia no válida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /endmatch:
    post:
      summary: Registra una partida ganada
      description: Marca como ganada una partida para el usuario indicado con la estrategia y dificultad especificadas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchRequest'
      responses:
        '202':
          description: Victoria registrada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Campos obligatorios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Faltan campos obligatorios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Dificultad no válida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '406':
          description: Estrategia no válida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                
  /allstats:
    post:
      summary: Obtiene todas las estadísticas del usuario
      description: >
        Devuelve un array con las estadísticas de todas las combinaciones de
        dificultad × estrategia, más una fila de totales globales.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsernameRequest'
      responses:
        '202':
          description: Estadísticas obtenidas correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: array
                    items:
                      $ref: '#/components/schemas/AllStatEntry'
                  message:
                    type: string
                    example: "Se obtienen todas las estadísticas de testuser."
        '400':
          description: Username ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /diffstats:
    post:
      summary: Obtiene las estadísticas agrupadas por dificultad
      description: Devuelve un array con las estadísticas acumuladas por cada nivel de dificultad (EASY, MEDIUM, HARD).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsernameRequest'
      responses:
        '202':
          description: Estadísticas por dificultad obtenidas correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiffStatEntry'
                  message:
                    type: string
                    example: "Se obtienen todas las estadísticas de testuser por dificultad."
        '400':
          description: Username ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stratstats:
    post:
      summary: Obtiene las estadísticas agrupadas por estrategia
      description: Devuelve un array con las estadísticas acumuladas por cada estrategia de bot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsernameRequest'
      responses:
        '202':
          description: Estadísticas por estrategia obtenidas correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: array
                    items:
                      $ref: '#/components/schemas/StratStatEntry'
                  message:
                    type: string
                    example: "Se obtienen todas las estadísticas de testuser por estrategia."
        '400':
          description: Username ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ranking/wins:
    get:
      summary: Ranking global por victorias
      description: Devuelve la lista de usuarios ordenados por porcentaje de victorias (partidas ganadas / jugadas).
      responses:
        '202':
          description: Ranking obtenido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ranking:
                    type: array
                    items:
                      $ref: '#/components/schemas/RankingEntry'
                  message:
                    type: string
                    example: "Ranking global por porcentaje de victorias."
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ranking/defeats:
    get:
      summary: Ranking global por derrotas
      description: Devuelve la lista de usuarios ordenados por porcentaje de derrotas (partidas perdidas / jugadas).
      responses:
        '202':
          description: Ranking obtenido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ranking:
                    type: array
                    items:
                      $ref: '#/components/schemas/RankingEntry'
                  message:
                    type: string
                    example: "Ranking global por porcentaje de derrotas."
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ranking/wins/difficulty:
    post:
      summary: Ranking de victorias por dificultad
      description: Devuelve la lista de usuarios con victorias para la dificultad indicada, ordenados por porcentaje.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - difficulty
              properties:
                difficulty:
                  type: string
                  enum:
                    - EASY
                    - MEDIUM
                    - HARD
                  example: "EASY"
      responses:
        '202':
          description: Ranking obtenido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ranking:
                    type: array
                    items:
                      $ref: '#/components/schemas/RankingEntry'
                  message:
                    type: string
                    example: "Ranking de porcentaje de victorias para dificultad EASY."
        '400':
          description: Dificultad ausente o inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ranking/wins/strategy:
    post:
      summary: Ranking de victorias por estrategia
      description: Devuelve la lista de usuarios con victorias para la estrategia indicada, ordenados por porcentaje.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - strategy
              properties:
                strategy:
                  type: string
                  enum:
                    - RANDOM
                    - DEFENSIVO
                    - OFENSIVO
                    - MONTE_CARLO
                    - MONTE_CARLO_MEJORADO
                    - MONTE_CARLO_ENDURECIDO
                  example: "RANDOM"
      responses:
        '202':
          description: Ranking obtenido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  ranking:
                    type: array
                    items:
                      $ref: '#/components/schemas/RankingEntry'
                  message:
                    type: string
                    example: "Ranking de porcentaje de victorias para estrategia RANDOM."
        '400':
          description: Estrategia ausente o inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Descripción del error
          example: "El usuario 'testuser' no existe. Prueba de nuevo o regístrate."

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Usuario testuser ha iniciado una partida: estrategia RANDOM, dificultad EASY."

    UsernameRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          example: "testuser"

    MatchRequest:
      type: object
      required:
        - username
        - strategy
        - difficulty
      properties:
        username:
          type: string
          example: "testuser"
        strategy:
          type: string
          enum:
            - RANDOM
            - DEFENSIVO
            - OFENSIVO
            - MONTE_CARLO
            - MONTE_CARLO_MEJORADO
            - MONTE_CARLO_ENDURECIDO
          example: "RANDOM"
        difficulty:
          type: string
          enum:
            - EASY
            - MEDIUM
            - HARD
          example: "EASY"

    User:
      type: object
      description: Datos del usuario sin contraseña
      properties:
        _id:
          type: string
          description: Identificador MongoDB
          example: "664abc123def456789012345"
        username:
          type: string
          example: "testuser"
        createdAt:
          type: string
          format: date-time
          example: "2025-04-01T10:00:00.000Z"
        totales:
          type: integer
          description: Total de partidas jugadas
          example: 10
        totalesWins:
          type: integer
          description: Total de partidas ganadas
          example: 4

    AllStatEntry:
      type: object
      description: Estadísticas de una combinación dificultad × estrategia (o fila de totales)
      properties:
        dificultad:
          type: string
          description: Nivel de dificultad (vacío en la fila de totales)
          example: "EASY"
        estrategia:
          type: string
          description: Estrategia del bot (o "TOTALES" en la fila de totales)
          example: "RANDOM"
        jugadas:
          type: integer
          example: 5
        perdidas:
          type: integer
          example: 2
        ganadas:
          type: integer
          example: 3
        porcentaje:
          type: string
          description: Porcentaje de victorias con dos decimales
          example: "60.00 %"

    DiffStatEntry:
      type: object
      description: Estadísticas acumuladas por nivel de dificultad
      properties:
        dificultad:
          type: string
          enum:
            - EASY
            - MEDIUM
            - HARD
          example: "EASY"
        jugadas:
          type: integer
          example: 8
        perdidas:
          type: integer
          example: 3
        ganadas:
          type: integer
          example: 5
        porcentaje:
          type: string
          example: "62.50 %"

    StratStatEntry:
      type: object
      description: Estadísticas acumuladas por estrategia de bot
      properties:
        estrategia:
          type: string
          enum:
            - RANDOM
            - DEFENSIVO
            - OFENSIVO
            - MONTE_CARLO
            - MONTE_CARLO_MEJORADO
            - MONTE_CARLO_ENDURECIDO
          example: "RANDOM"
        jugadas:
          type: integer
          example: 6
        perdidas:
          type: integer
          example: 2
        ganadas:
          type: integer
          example: 4
        porcentaje:
          type: string
          example: "66.67 %"

    RankingEntry:
      type: object
      description: Entrada del ranking global con posición, usuario, valor y porcentaje
      properties:
        position:
          type: integer
          description: Posición en el ranking (puede repetirse en caso de empate)
          example: 1
        username:
          type: string
          example: "testuser"
        value:
          type: integer
          description: Número de victorias o derrotas según el endpoint
          example: 5
        percentage:
          type: number
          format: float
          description: Porcentaje de victorias (o derrotas) sobre partidas jugadas
          example: 83.33